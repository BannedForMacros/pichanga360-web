<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Pichanga360">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1B3F72"/>
      <stop offset="100%" stop-color="#0D1B2A"/>
    </linearGradient>
  </defs>
  <!-- Maskable: el contenido importante debe vivir dentro del "safe zone"
       central del 80% (centro 410x410). Llenamos el cuadro completo con el
       fondo y mantenemos la P + balón + 360 dentro del safe zone. -->
  <rect width="512" height="512" fill="url(#g)"/>
  <!-- Balón -->
  <circle cx="360" cy="170" r="36" fill="#F5A623" opacity="0.95"/>
  <!-- Letra P (centrada en el safe zone) -->
  <path d="M 165 160 L 165 380 L 215 380 L 215 300 L 280 300 C 332 300 362 268 362 227 C 362 187 332 160 280 160 Z M 215 200 L 272 200 C 297 200 313 213 313 227 C 313 244 297 257 272 257 L 215 257 Z" fill="#FFFFFF"/>
  <!-- 360 -->
  <text x="346" y="370" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="44" font-weight="900" text-anchor="middle" fill="#F5A623">360</text>
</svg>
